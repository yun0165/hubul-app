<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>바당이모 후불장부</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
<style>
:root{
  --ink:#12303F;
  --ink-soft:#5A7280;
  --bg:#EFF4F3;
  --card:#FFFFFF;
  --sea:#10646B;
  --sea-deep:#0B3C4A;
  --sea-mist:#DFEBEA;
  --coral:#E2603F;
  --coral-soft:#FBEAE3;
  --ok:#2E8B57;
  --ok-soft:#E6F3EC;
  --line:#DCE5E4;
  --radius:14px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{
  font-family:'Pretendard Variable',Pretendard,-apple-system,'Apple SD Gothic Neo','Malgun Gothic',sans-serif;
  background:var(--bg);color:var(--ink);line-height:1.5;
  padding-bottom:90px;
}
.wrap{max-width:560px;margin:0 auto;padding:0 14px}

/* ── 헤더 ── */
header{
  background:var(--sea-deep);color:#fff;
  padding:18px 0 46px;position:relative;overflow:hidden;
}
header .wrap{display:flex;justify-content:space-between;align-items:center}
.brand{font-size:19px;font-weight:800;letter-spacing:-.02em}
.brand small{display:block;font-size:11px;font-weight:500;opacity:.7;letter-spacing:.06em;margin-top:2px}
.hbtns{display:flex;gap:8px}
.hbtn{
  background:rgba(255,255,255,.14);border:none;color:#fff;
  font-size:12px;font-weight:600;padding:7px 11px;border-radius:9px;cursor:pointer;
  font-family:inherit;
}
.wave{position:absolute;bottom:-1px;left:0;width:100%;height:26px;display:block}

/* ── 대시보드 ── */
.dash{display:flex;gap:10px;margin-top:-30px;position:relative;z-index:2}
.dcard{
  flex:1;background:var(--card);border-radius:var(--radius);
  padding:14px 16px;box-shadow:0 3px 14px rgba(11,60,74,.10);
}
.dcard .lbl{font-size:11.5px;font-weight:600;color:var(--ink-soft)}
.dcard .val{font-size:21px;font-weight:800;letter-spacing:-.02em;margin-top:2px}
.dcard .sub{font-size:11px;color:var(--ink-soft);margin-top:1px}
.dcard.owe .val{color:var(--coral)}
.dcard.paid .val{color:var(--sea)}

/* ── 추가 버튼 ── */
.addbar{margin-top:14px}
.btn-add{
  width:100%;background:var(--sea);color:#fff;border:none;
  font-family:inherit;font-size:15px;font-weight:700;
  padding:14px;border-radius:var(--radius);cursor:pointer;
  box-shadow:0 3px 10px rgba(16,100,107,.25);
}
.btn-add:active{transform:scale(.99)}

/* ── 필터/검색 ── */
.tools{display:flex;gap:8px;margin-top:14px;align-items:center}
.tabs{display:flex;gap:6px;flex:1}
.tab{
  border:1px solid var(--line);background:#fff;color:var(--ink-soft);
  font-family:inherit;font-size:12.5px;font-weight:600;
  padding:7px 12px;border-radius:999px;cursor:pointer;white-space:nowrap;
}
.tab.on{background:var(--sea-deep);border-color:var(--sea-deep);color:#fff}
.search{
  width:110px;border:1px solid var(--line);border-radius:999px;
  padding:7px 12px;font-family:inherit;font-size:12.5px;background:#fff;color:var(--ink);
}
.search:focus{outline:2px solid var(--sea);border-color:transparent}

/* ── 거래 카드 ── */
.list{margin-top:12px;display:flex;flex-direction:column;gap:10px}
.tcard{
  background:var(--card);border-radius:var(--radius);padding:14px 15px;
  box-shadow:0 1px 5px rgba(11,60,74,.07);border-left:4px solid var(--sea-mist);
}
.tcard.unpaid{border-left-color:var(--coral)}
.tcard.paid{border-left-color:var(--ok);opacity:.88}
.trow1{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
.tname{font-size:15.5px;font-weight:800}
.tname small{font-weight:500;font-size:12px;color:var(--ink-soft);margin-left:6px}
.tamount{font-size:16.5px;font-weight:800;white-space:nowrap}
.tcard.unpaid .tamount{color:var(--coral)}
.tcard.paid .tamount{color:var(--ok)}
.trow2{font-size:13px;color:var(--ink-soft);margin-top:3px}
.trow3{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;align-items:center}
.chip{
  font-size:11px;font-weight:600;padding:3px 9px;border-radius:999px;
  background:var(--sea-mist);color:var(--sea-deep);
}
.chip.warn{background:var(--coral-soft);color:var(--coral)}
.chip.done{background:var(--ok-soft);color:var(--ok)}
.tmemo{font-size:12px;color:var(--ink-soft);margin-top:6px;background:var(--bg);border-radius:8px;padding:6px 9px}
.tacts{display:flex;gap:7px;margin-top:11px}
.abtn{
  flex:1;border:none;font-family:inherit;font-size:12.5px;font-weight:700;
  padding:9px 0;border-radius:9px;cursor:pointer;
}
.abtn.pay{background:var(--sea);color:#fff}
.abtn.sms{background:var(--sea-mist);color:var(--sea-deep)}
.abtn.ghost{background:#fff;border:1px solid var(--line);color:var(--ink-soft);flex:0 0 44px}
.abtn.undo{background:var(--ok-soft);color:var(--ok)}
.empty{
  text-align:center;padding:44px 20px;color:var(--ink-soft);font-size:13.5px;
  background:var(--card);border-radius:var(--radius);margin-top:12px;
}
.empty b{display:block;font-size:15px;color:var(--ink);margin-bottom:5px}

/* ── 모달 ── */
.overlay{
  display:none;position:fixed;inset:0;background:rgba(11,60,74,.45);
  z-index:50;align-items:flex-end;justify-content:center;
}
.overlay.show{display:flex}
.modal{
  background:#fff;width:100%;max-width:560px;border-radius:20px 20px 0 0;
  padding:20px 18px 26px;max-height:88vh;overflow-y:auto;
}
.mtitle{font-size:17px;font-weight:800;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center}
.mclose{background:none;border:none;font-size:20px;color:var(--ink-soft);cursor:pointer;font-family:inherit;padding:4px 8px}
.f{margin-bottom:12px}
.f label{display:block;font-size:12px;font-weight:700;color:var(--ink-soft);margin-bottom:5px}
.f input,.f select,.f textarea{
  width:100%;border:1.5px solid var(--line);border-radius:10px;
  padding:11px 12px;font-family:inherit;font-size:15px;background:#fff;color:var(--ink);
}
.f input:focus,.f select:focus,.f textarea:focus{outline:none;border-color:var(--sea)}
.frow{display:flex;gap:10px}
.frow .f{flex:1}
.pchips{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:7px}
.pchip{
  border:1.5px solid var(--line);background:#fff;color:var(--ink-soft);
  font-family:inherit;font-size:12.5px;font-weight:600;
  padding:7px 12px;border-radius:999px;cursor:pointer;
}
.pchip.on{background:var(--sea);border-color:var(--sea);color:#fff}
.btn-save{
  width:100%;background:var(--sea-deep);color:#fff;border:none;
  font-family:inherit;font-size:15.5px;font-weight:800;
  padding:14px;border-radius:12px;cursor:pointer;margin-top:6px;
}
.hint{font-size:11.5px;color:var(--ink-soft);margin-top:4px}

/* ── 토스트 ── */
.toast{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);
  background:var(--sea-deep);color:#fff;font-size:13.5px;font-weight:600;
  padding:11px 20px;border-radius:999px;box-shadow:0 4px 16px rgba(0,0,0,.25);
  transition:transform .25s ease;z-index:99;white-space:nowrap;
}
.toast.show{transform:translateX(-50%) translateY(0)}

@media (min-width:561px){
  .overlay{align-items:center}
  .modal{border-radius:20px}
  .search{width:150px}
}
</style>
</head>
<body>

<header>
  <div class="wrap">
    <div class="brand">🌊 바당이모 후불장부<small>택배거래 · 후불 입금 관리</small></div>
    <div class="hbtns">
      <button class="hbtn" onclick="openSettings()">⚙ 설정</button>
      <button class="hbtn" onclick="exportCSV()">⬇ CSV</button>
    </div>
  </div>
  <svg class="wave" viewBox="0 0 560 26" preserveAspectRatio="none"><path d="M0,14 C70,26 140,2 210,12 C280,22 350,4 420,12 C490,20 530,8 560,14 L560,26 L0,26 Z" fill="#EFF4F3"/></svg>
</header>

<div class="wrap">
  <div class="dash">
    <div class="dcard owe">
      <div class="lbl">받을 돈 (미수금)</div>
      <div class="val" id="dOwe">0원</div>
      <div class="sub" id="dOweCnt">0건 입금대기</div>
    </div>
    <div class="dcard paid">
      <div class="lbl">이번 달 입금완료</div>
      <div class="val" id="dPaid">0원</div>
      <div class="sub" id="dPaidCnt">0건 완료</div>
    </div>
  </div>

  <div class="addbar">
    <button class="btn-add" onclick="openForm()">＋ 새 택배거래 등록</button>
  </div>

  <div class="tools">
    <div class="tabs">
      <button class="tab on" data-f="unpaid" onclick="setFilter('unpaid',this)">입금대기</button>
      <button class="tab" data-f="paid" onclick="setFilter('paid',this)">입금완료</button>
      <button class="tab" data-f="all" onclick="setFilter('all',this)">전체</button>
    </div>
    <input class="search" id="q" placeholder="이름 검색" oninput="render()">
  </div>

  <div class="list" id="list"></div>
</div>

<!-- 등록/수정 모달 -->
<div class="overlay" id="formOv" onclick="if(event.target===this)closeForm()">
  <div class="modal">
    <div class="mtitle"><span id="mTitle">새 택배거래</span><button class="mclose" onclick="closeForm()">✕</button></div>
    <input type="hidden" id="editId">
    <div class="frow">
      <div class="f"><label>고객명 / 닉네임 *</label><input id="fName" placeholder="예: 홍길동"></div>
      <div class="f"><label>연락처</label><input id="fPhone" inputmode="tel" placeholder="010-0000-0000"></div>
    </div>
    <div class="f">
      <label>상품</label>
      <div class="pchips">
        <button class="pchip" onclick="pickProduct(this,'철제선반 블랙')">선반 블랙</button>
        <button class="pchip" onclick="pickProduct(this,'철제선반 화이트')">선반 화이트</button>
        <button class="pchip" onclick="pickProduct(this,'')">직접입력</button>
      </div>
      <input id="fProduct" placeholder="상품명 입력">
    </div>
    <div class="frow">
      <div class="f"><label>수량</label><input id="fQty" type="number" inputmode="numeric" value="1" min="1"></div>
      <div class="f"><label>금액 (원) *</label><input id="fAmount" type="number" inputmode="numeric" placeholder="55000"></div>
    </div>
    <div class="frow">
      <div class="f"><label>발송일</label><input id="fDate" type="date"></div>
      <div class="f"><label>택배사</label>
        <select id="fCourier">
          <option>로젠택배</option><option>CJ대한통운</option><option>한진택배</option>
          <option>롯데택배</option><option>우체국택배</option><option>경동택배</option><option>기타</option>
        </select>
      </div>
    </div>
    <div class="f"><label>송장번호</label><input id="fTrack" inputmode="numeric" placeholder="숫자만 입력"></div>
    <div class="f"><label>메모</label><textarea id="fMemo" rows="2" placeholder="예: 문 앞에 놔달라고 함, 입금 약속일 등"></textarea></div>
    <button class="btn-save" onclick="save()">저장하기</button>
  </div>
</div>

<!-- 설정 모달 -->
<div class="overlay" id="setOv" onclick="if(event.target===this)closeSettings()">
  <div class="modal">
    <div class="mtitle"><span>설정</span><button class="mclose" onclick="closeSettings()">✕</button></div>
    <div class="f">
      <label>입금 계좌 (문자 안내에 들어가요)</label>
      <input id="sAccount" placeholder="예: 농협 000-0000-0000 ○○○">
      <div class="hint">‘문자복사’를 누르면 고객명·금액·계좌가 채워진 안내문이 복사돼요.</div>
    </div>
    <div class="f">
      <label>보내는 사람 이름</label>
      <input id="sSender" placeholder="예: 바당이모">
    </div>
    <button class="btn-save" onclick="saveSettings()">저장하기</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const KEY='hubul-ledger-v1', SKEY='hubul-settings-v1';
let data=JSON.parse(localStorage.getItem(KEY)||'[]');
let settings=JSON.parse(localStorage.getItem(SKEY)||'{"account":"","sender":"바당이모"}');
let filter='unpaid';

const won=n=>Number(n||0).toLocaleString('ko-KR')+'원';
const today=()=>new Date().toISOString().slice(0,10);
const daysSince=d=>{if(!d)return 0;return Math.floor((new Date(today())-new Date(d))/86400000);}

function persist(){localStorage.setItem(KEY,JSON.stringify(data));}

function toast(msg){
  const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
  clearTimeout(t._tm);t._tm=setTimeout(()=>t.classList.remove('show'),1800);
}

/* ── 필터 ── */
function setFilter(f,btn){
  filter=f;
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');render();
}

/* ── 렌더 ── */
function render(){
  const q=document.getElementById('q').value.trim();
  let rows=data.slice();
  if(filter==='unpaid')rows=rows.filter(r=>!r.paid);
  if(filter==='paid')rows=rows.filter(r=>r.paid);
  if(q)rows=rows.filter(r=>(r.name||'').includes(q)||(r.product||'').includes(q)||(r.track||'').includes(q));
  // 미수는 오래된 순(발송일), 완료는 최근 입금 순
  rows.sort((a,b)=>{
    if(!a.paid&&!b.paid)return (a.shipDate||'').localeCompare(b.shipDate||'');
    if(a.paid&&b.paid)return (b.paidDate||'').localeCompare(a.paidDate||'');
    return a.paid?1:-1;
  });

  const list=document.getElementById('list');
  if(!rows.length){
    list.innerHTML='<div class="empty"><b>'+(filter==='unpaid'?'입금대기 건이 없어요 👍':'표시할 거래가 없어요')+'</b>새 택배거래를 등록해 보세요.</div>';
  }else{
    list.innerHTML=rows.map(r=>{
      const d=daysSince(r.shipDate);
      const late=!r.paid&&d>=5;
      const badge=r.paid
        ?'<span class="chip done">✓ '+(r.paidDate||'')+' 입금</span>'
        :'<span class="chip '+(late?'warn':'')+'">발송 D+'+d+(late?' ⚠':'')+'</span>';
      return '<div class="tcard '+(r.paid?'paid':'unpaid')+'">'
        +'<div class="trow1"><div class="tname">'+esc(r.name)+(r.phone?'<small>'+esc(r.phone)+'</small>':'')+'</div>'
        +'<div class="tamount">'+won(r.amount)+'</div></div>'
        +'<div class="trow2">'+esc(r.product||'상품 미입력')+(r.qty>1?' × '+r.qty:'')+'</div>'
        +'<div class="trow3">'+badge
        +(r.shipDate?'<span class="chip">'+r.shipDate+' 발송</span>':'')
        +(r.track?'<span class="chip">'+esc(r.courier||'')+' '+esc(r.track)+'</span>':'')
        +'</div>'
        +(r.memo?'<div class="tmemo">'+esc(r.memo)+'</div>':'')
        +'<div class="tacts">'
        +(r.paid
          ?'<button class="abtn undo" onclick="togglePaid(\''+r.id+'\')">입금취소 (대기로)</button>'
          :'<button class="abtn pay" onclick="togglePaid(\''+r.id+'\')">✓ 입금확인</button>'
           +'<button class="abtn sms" onclick="copySMS(\''+r.id+'\')">문자복사</button>')
        +'<button class="abtn ghost" onclick="edit(\''+r.id+'\')">✎</button>'
        +'<button class="abtn ghost" onclick="del(\''+r.id+'\')">🗑</button>'
        +'</div></div>';
    }).join('');
  }

  // 대시보드
  const unpaid=data.filter(r=>!r.paid);
  const owe=unpaid.reduce((s,r)=>s+Number(r.amount||0),0);
  const ym=today().slice(0,7);
  const paidM=data.filter(r=>r.paid&&(r.paidDate||'').startsWith(ym));
  const paidSum=paidM.reduce((s,r)=>s+Number(r.amount||0),0);
  document.getElementById('dOwe').textContent=won(owe);
  document.getElementById('dOweCnt').textContent=unpaid.length+'건 입금대기';
  document.getElementById('dPaid').textContent=won(paidSum);
  document.getElementById('dPaidCnt').textContent=paidM.length+'건 완료';
}

function esc(s){return String(s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}

/* ── 등록/수정 ── */
function openForm(){
  document.getElementById('mTitle').textContent='새 택배거래';
  document.getElementById('editId').value='';
  ['fName','fPhone','fProduct','fTrack','fMemo'].forEach(i=>document.getElementById(i).value='');
  document.getElementById('fQty').value=1;
  document.getElementById('fAmount').value='';
  document.getElementById('fDate').value=today();
  document.getElementById('fCourier').value='로젠택배';
  document.querySelectorAll('.pchip').forEach(c=>c.classList.remove('on'));
  document.getElementById('formOv').classList.add('show');
  setTimeout(()=>document.getElementById('fName').focus(),100);
}
function closeForm(){document.getElementById('formOv').classList.remove('show');}
function pickProduct(btn,val){
  document.querySelectorAll('.pchip').forEach(c=>c.classList.remove('on'));
  btn.classList.add('on');
  const inp=document.getElementById('fProduct');
  if(val){inp.value=val;}else{inp.value='';inp.focus();}
}
function save(){
  const name=document.getElementById('fName').value.trim();
  const amount=document.getElementById('fAmount').value;
  if(!name){toast('고객명을 입력해 주세요');return;}
  if(!amount){toast('금액을 입력해 주세요');return;}
  const id=document.getElementById('editId').value;
  const rec={
    name, phone:document.getElementById('fPhone').value.trim(),
    product:document.getElementById('fProduct').value.trim(),
    qty:Number(document.getElementById('fQty').value||1),
    amount:Number(amount),
    shipDate:document.getElementById('fDate').value,
    courier:document.getElementById('fCourier').value,
    track:document.getElementById('fTrack').value.trim(),
    memo:document.getElementById('fMemo').value.trim(),
  };
  if(id){
    const r=data.find(x=>x.id===id);Object.assign(r,rec);toast('수정했어요');
  }else{
    rec.id='t'+Date.now();rec.paid=false;rec.paidDate='';rec.created=today();
    data.push(rec);toast('등록했어요');
  }
  persist();closeForm();render();
}
function edit(id){
  const r=data.find(x=>x.id===id);if(!r)return;
  openForm();
  document.getElementById('mTitle').textContent='거래 수정';
  document.getElementById('editId').value=id;
  document.getElementById('fName').value=r.name||'';
  document.getElementById('fPhone').value=r.phone||'';
  document.getElementById('fProduct').value=r.product||'';
  document.getElementById('fQty').value=r.qty||1;
  document.getElementById('fAmount').value=r.amount||'';
  document.getElementById('fDate').value=r.shipDate||today();
  document.getElementById('fCourier').value=r.courier||'로젠택배';
  document.getElementById('fTrack').value=r.track||'';
  document.getElementById('fMemo').value=r.memo||'';
}
function del(id){
  const r=data.find(x=>x.id===id);
  if(!confirm((r?r.name+'님 ':'')+'거래를 삭제할까요?'))return;
  data=data.filter(x=>x.id!==id);persist();render();toast('삭제했어요');
}
function togglePaid(id){
  const r=data.find(x=>x.id===id);if(!r)return;
  r.paid=!r.paid;
  r.paidDate=r.paid?today():'';
  persist();render();
  toast(r.paid?'입금완료 처리! 💰':'입금대기로 되돌렸어요');
}

/* ── 문자 템플릿 ── */
function copySMS(id){
  const r=data.find(x=>x.id===id);if(!r)return;
  const acct=settings.account?('\n입금계좌: '+settings.account):'';
  const msg='안녕하세요 '+r.name+'님, '+(settings.sender||'바당이모')+'입니다 😊\n'
    +'보내드린 '+(r.product||'상품')+(r.qty>1?' '+r.qty+'개':'')+' 잘 받으셨을까요?\n'
    +'확인되시면 '+won(r.amount)+' 입금 부탁드릴게요.'+acct+'\n감사합니다!';
  copyText(msg);
}
function copyText(text){
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).then(()=>toast('문자 내용 복사 완료! 붙여넣기 하세요'),()=>fallbackCopy(text));
  }else fallbackCopy(text);
}
function fallbackCopy(text){
  const ta=document.createElement('textarea');ta.value=text;document.body.appendChild(ta);
  ta.select();try{document.execCommand('copy');toast('문자 내용 복사 완료!');}catch(e){alert(text);}
  document.body.removeChild(ta);
}

/* ── 설정 ── */
function openSettings(){
  document.getElementById('sAccount').value=settings.account||'';
  document.getElementById('sSender').value=settings.sender||'바당이모';
  document.getElementById('setOv').classList.add('show');
}
function closeSettings(){document.getElementById('setOv').classList.remove('show');}
function saveSettings(){
  settings.account=document.getElementById('sAccount').value.trim();
  settings.sender=document.getElementById('sSender').value.trim()||'바당이모';
  localStorage.setItem(SKEY,JSON.stringify(settings));
  closeSettings();toast('설정 저장 완료');
}

/* ── CSV ── */
function exportCSV(){
  if(!data.length){toast('내보낼 거래가 없어요');return;}
  const head=['고객명','연락처','상품','수량','금액','발송일','택배사','송장번호','상태','입금일','메모'];
  const rows=data.map(r=>[r.name,r.phone,r.product,r.qty,r.amount,r.shipDate,r.courier,r.track,r.paid?'입금완료':'입금대기',r.paidDate,r.memo]
    .map(v=>'"'+String(v==null?'':v).replace(/"/g,'""')+'"').join(','));
  const csv='\uFEFF'+head.join(',')+'\n'+rows.join('\n');
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv;charset=utf-8'}));
  a.download='후불장부_'+today()+'.csv';a.click();
  toast('CSV 파일 저장!');
}

render();
</script>
